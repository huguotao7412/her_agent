# =============================================================================
# Her_Agent (QQ Bot) 核心配置文件
# =============================================================================

# 1. 强制锁死模型和通道
model:
  default: "doubao-seed-2-0-pro-260215"
  provider: "openai"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  api_mode: "codex_responses"
  extra:
    temperature: 0.70     # 把这个值调高，默认通常是0.1或者0.6
    top_p: 0.9
    frequency_penalty: 0.6

# =============================================================================
# 大模型供应商 (Providers) 配置
# =============================================================================
providers:
  openai:
    enabled: true
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    models:
      - "doubao-seed-2-0-pro-260215"

  # 关闭其他不需要的供应商
  anthropic:
    enabled: false
  openrouter:
    enabled: false
  gemini:
    enabled: false
  ollama:
    enabled: false

# =============================================================================
# 平台网关 (Gateway) 配置
# =============================================================================
platforms:
  qqbot:
    enabled: true
    command_prefix: ""
    extra:
      app_id: "1903879141"             # 必须配置
      client_secret: "FUcbSGzX2LRL1Sil"  # 必须配置
      default_skills: ["her_persona"]
      group_policy: "open"

      user_personas:
        "E3EEE2195F90332176A6FFC1142E7CE4": [ "her_persona" ]

  # 强制关闭所有其他平台
  discord:
    enabled: false
  slack:
    enabled: false
  telegram:
    enabled: false
  feishu:
    enabled: false
  mattermost:
    enabled: false

# =============================================================================
# 安全与环境 (Security & Environments)
# =============================================================================
security:
  # 彻底禁用代码自动执行沙盒，避免大模型尝试去“执行任务”
  enable_code_execution: false

environments:
  # 关闭所有环境，让它纯粹地作为一个“大脑”去聊天
  local:
    enabled: false
  docker:
    enabled: false
  modal:
    enabled: false

# =============================================================================
# 记忆与技能 (Memory & Skills)
# =============================================================================
memory:
  # 启用本地 JSON 或 SQLite 记忆存储（用于自进化人格）
  provider: "local"

# MCP 外部工具（暂时留空，后续我们在这里挂载你写好的蒸馏脚本服务）
mcp:
  servers: {}